# Keeps the :edge image tags current on every main merge that touches container files.
# This is NOT a PR gate — it publishes after code lands on main (see docker-ci.yml for
# the PR build-only validation, and docker-publish.yml for tagged releases).
#
# The paths filter means this only runs when container-relevant files change, so docs-only
# or unrelated merges to main don't rebuild/republish images.
#
# Pushed tags: ghcr.io/<owner>/strand-{backend,frontend}:edge and :sha-<short>.
name: Publish edge Docker images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "**/Dockerfile"
      - "**/.dockerignore"
      - "docker-compose.yml"
      - ".github/workflows/docker-edge.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-edge:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/strand-${{ matrix.name }}
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
