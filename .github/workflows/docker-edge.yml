# Keeps the :edge image tags current on every main merge that touches container files.
# This is NOT a PR gate — it publishes after code lands on main (see docker-ci.yml for
# the PR build-only validation, and docker-publish.yml for tagged releases).
#
# The paths filter means this only runs when container-relevant files change, so docs-only
# or unrelated merges to main don't rebuild/republish images.
#
# Multi-arch is built WITHOUT QEMU emulation: each platform builds on its own native
# runner (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm — free for public repos),
# pushes by digest, and a final job stitches the digests into one manifest per tag. This
# avoids the emulated-arm64 OOM that made the memory-heavy frontend build flaky.
#
# Pushed tags: ghcr.io/<owner>/strand-{backend,frontend}:edge and :sha-<short>.
name: Publish edge Docker images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "**/Dockerfile"
      - "**/.dockerignore"
      - "docker-compose.yml"
      - ".github/workflows/docker-edge.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # One job per (image, architecture), each on its native runner. Builds and pushes the
  # image by digest only (no tag yet) so the merge job can assemble the manifest list.
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: backend, context: ./backend, platform: linux/amd64, runner: ubuntu-latest }
          - { name: backend, context: ./backend, platform: linux/arm64, runner: ubuntu-24.04-arm }
          - { name: frontend, context: ./frontend, platform: linux/amd64, runner: ubuntu-latest }
          - { name: frontend, context: ./frontend, platform: linux/arm64, runner: ubuntu-24.04-arm }
    steps:
      - name: Prepare platform slug
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/strand-${{ matrix.name }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/strand-${{ matrix.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=edge-${{ matrix.name }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=edge-${{ matrix.name }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-edge-${{ matrix.name }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # One job per image: gather the per-arch digests and publish a single multi-arch
  # manifest list under the :edge and :sha-<short> tags.
  merge:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [backend, frontend]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-edge-${{ matrix.name }}-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/strand-${{ matrix.name }}
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-,format=short

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ github.repository_owner }}/strand-${{ matrix.name }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository_owner }}/strand-${{ matrix.name }}:${{ steps.meta.outputs.version }}
